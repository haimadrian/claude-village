name: Unit tests
on: [push, pull_request]
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lint-typecheck-unit:
    name: Lint, typecheck, unit tests + coverage
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - name: Run unit tests with coverage
        run: pnpm test
        env:
          CI: "true"
      - name: Publish unit test results
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Unit tests
          path: reports/unit-junit.xml
          reporter: jest-junit
          fail-on-error: false
      - name: Upload unit HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: reports/unit-html
          retention-days: 14
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: reports/coverage
          retention-days: 14
      - name: Publish coverage summary
        if: always()
        run: node scripts/ci-coverage-summary.mjs >> "$GITHUB_STEP_SUMMARY"
