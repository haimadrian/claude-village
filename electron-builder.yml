appId: com.haimadrian.claudevillage
productName: claude-village
directories:
  output: release
files:
  - out/**/*
  - package.json
mac:
  category: public.app-category.developer-tools
  target: dmg
  icon: build/icon.png
  hardenedRuntime: false
  identity: null
# The Release workflow uses softprops/action-gh-release to attach the
# built .dmg (plus .blockmap / latest-mac.yml) to the GitHub Release.
# electron-builder must NOT attempt its own auto-publish on CI - it
# would demand a GH_TOKEN and fail the "Package .dmg" step before our
# workflow step ever runs.
publish: null
